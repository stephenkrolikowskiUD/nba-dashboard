<!DOCTYPE html>

<head>

<title>NBA DFS Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#fff;font-family:system-ui,-apple-system,sans-serif;max-width:480px;margin:0 auto;padding-bottom:60px}

.header-title{color:#eab308;font-weight:700;font-size:13px}
.refresh-btn{background:none;border:1px solid #444;border-radius:6px;color:#9ca3af;font-size:11px;padding:4px 10px;cursor:pointer}
.row{display:flex;gap:8px;margin-top:8px}

.section{padding:14px 16px 0}
.label{color:#e5e7eb;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

.mini-bar-label{font-size:8px;color:#d1d5db;margin-top:2px}
.mini-bar-val{font-size:8px;color:#fff;font-weight:600;margin-top:1px}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}

.streak-card{background:#1a1a1a;border-radius:10px;padding:12px 14px;margin:0 16px 8px;border-left:3px solid #444;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}

.streak-card.inferno{border-left-color:#ef4444}.streak-card.inferno::before{background:linear-gradient(90deg,transparent,rgba(239,68,68,.5),transparent);opacity:1}
.streak-card.fire{border-left-color:#ff6b35}.streak-card.fire::before{background:linear-gradient(90deg,transparent,rgba(255,107,53,.4),transparent);opacity:1}
.streak-card.hot{border-left-color:#eab308}.streak-card.hot::before{background:linear-gradient(90deg,transparent,rgba(234,179,8,.3),transparent);opacity:1}
.streak-card.warm{border-left-color:#ffd966}

.streak-player{font-weight:700;font-size:14px}

.streak-stat{flex:1;text-align:center}
.streak-stat-label{font-size:8px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;font-weight:600}

.streak-stat-divider{border-left:1px solid rgba(255,255,255,.06);height:24px}
.streak-chart{display:flex;align-items:flex-end;gap:2px;height:28px}

.streak-action{margin-top:8px}
.streak-dash-btn{width:100%;padding:7px 0;border-radius:6px;border:1px solid #444;background:#1a1a1a;color:#d1d5db;font-size:11px;font-weight:600;cursor:pointer;text-align:center}

.sf-btn{padding:5px 10px;font-size:10px;font-weight:700;color:#9ca3af;background:#1a1a1a;border:1px solid #444;border-radius:14px;cursor:pointer;white-space:nowrap;flex-shrink:0}

.props-filter{display:flex;gap:6px;padding:8px 16px;overflow-x:auto}
.pf-btn{padding:6px 12px;font-size:11px;font-weight:600;color:#9ca3af;background:#1a1a1a;border:1px solid #444;border-radius:16px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pf-btn.active{color:#eab308;background:#eab30815;border-color:#eab308}
.props-tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:50vh;padding:0 16px 16px}
.props-tbl-wrap table{min-width:420px}
.odds-over{color:#22c55e;font-weight:600}
.odds-under{color:#ef4444;font-weight:600}

/* Desktop */
.top-nav{display:none}
.header-controls{display:flex;flex-direction:column;gap:8px;margin-top:8px}

  body{max-width:1400px;padding-bottom:0}
  .tab-bar{display:none}

  .top-nav .tab-btn:hover{background:#1a1a1a}

  .header{padding:12px 24px;display:flex;flex-wrap:wrap;align-items:center;gap:12px}
  .header-top{margin-bottom:0;margin-right:auto}
  .header-controls{display:flex;align-items:center;gap:10px;width:100%;margin-top:8px;flex-direction:row}
  .header-controls select,.header-controls input{width:auto;min-width:100px}

  .section{padding:16px 24px 0}

  .stat-item{min-width:55px}.stat-val{font-size:15px}.stat-label{font-size:10px}
  .bar-chart{height:130px;gap:5px}.bar-val{font-size:9px}.bar-date{font-size:9px}

  .dash-grid>.section{padding:16px 0 0}

  table{font-size:13px}th,td{padding:8px 6px}
  .log-table-wrap{padding:0 24px 24px;max-height:calc(100vh - 140px)}
  .log-controls{padding:12px 24px;max-width:300px}
  .ai-pick-card,.bet-card,.streak-card,.draft-card{margin:0 0 8px}
  .cards-wrap{padding:0 24px}
  .picks-summary,.bet-summary{padding:0 24px 12px}
  .sub-tabs{padding:8px 24px}
  .props-filter{padding:8px 24px}
  .props-tbl-wrap{padding:0 24px 16px;max-height:65vh}
  .draft-controls{padding:6px 24px}
  .draft-tier-label{padding:8px 24px 4px}

<body>
<div id="app"><div class="loading"><div style="font-size:32px;animation:bounce .8s ease-in-out infinite">🏀</div><div style="color:#666;font-size:14px">Loading dashboard...</div></div></div>
<script>
const SHEET_ID="12gBgVx_RCsIytjZHjfZWgLtG-R-zcPbYYE-CVFd4EDw";
const METRICS=["PTS","REB","AST","PRA","PR","PA","RA","FG3M","STOCKS","DK_FP","FPPM","USAGE_PPM"];
let st={tonight:[],playerStats:[],props:[],splits:[],aiPicks:[],player:"",metric:"PTS",line:"",activeTab:"dashboard",oppFilter:"",picksView:"bets",propsMetric:"ALL",propsSearch:"",streakFilter:"all",streaks:[],drafted:new Set(),loading:true,error:null,loadedAt:null};
let cache={player:null,sortedLogs:null};

const toNum=v=>parseFloat(v)||0;
const fmtOdds=v=>{if(!v&&v!==0)return"—";v=parseInt(v);return v>0?`+${v}`:`${v}`};
const barColor=(v,l)=>!l?"#eab308":v>l?"#22c55e":v===l?"#9ca3af":"#ef4444";
const avgColor=(v,l)=>!l?"#eab308":v>=l?"#eab308":"#f97316";
const esc=s=>String(s||"").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function impliedProb(odds){if(!odds&&odds!==0)return null;const o=parseInt(odds);if(isNaN(o))return null;return o<0?Math.abs(o)/(Math.abs(o)+100):100/(o+100)}

const fetchSheet=n=>new Promise((res,rej)=>{
  fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(n)}`)
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.text()})
  .then(t=>{Papa.parse(t,{header:true,skipEmptyLines:true,dynamicTyping:true,complete:r=>res(r.data),error:rej})})
  .catch(rej);
});

function getPlayerLogs(name){
  if(cache.player===name&&cache.sortedLogs)return cache.sortedLogs;
  cache.player=name;
  cache.sortedLogs=st.playerStats.filter(p=>p.PLAYER_NAME===name).sort((a,b)=>(b.GAME_DATE||"").localeCompare(a.GAME_DATE||""));
  return cache.sortedLogs;
}

// ═══ +EV ENGINE ═══
function getHitRate(name,metric,line){
  const logs=getPlayerLogs(name);
  if(logs.length<3)return null;
  const ln=parseFloat(line);if(isNaN(ln))return null;
  const hits=logs.filter(g=>toNum(g[metric])>ln).length;
  return{rate:hits/logs.length,hits,total:logs.length};
}

function getBestBets(){
  if(!st.props.length||!st.playerStats.length)return[];
  const bets=[];
  const tonightSet=new Set(st.tonight.map(p=>p.PLAYER_NAME).filter(Boolean));
  for(const p of st.props){
    const name=p.PLAYER_NAME;if(!name||!tonightSet.has(name))continue;
    const metric=p.METRIC;
    const line=parseFloat(p.DK_LINE);if(isNaN(line))continue;
    const overOdds=parseInt(p.OVER_ODDS);const underOdds=parseInt(p.UNDER_ODDS);
    if(isNaN(overOdds)&&isNaN(underOdds))continue;
    const hr=getHitRate(name,metric,line);
    if(!hr||hr.total<3)continue;
    const overIP=impliedProb(overOdds);const underIP=impliedProb(underOdds);
    let overEdge=null,underEdge=null;
    if(overIP!==null)overEdge=hr.rate-overIP;
    if(underIP!==null)underEdge=(1-hr.rate)-underIP;
    let lean,edge,odds,ip,hitRate;
    if(overEdge!==null&&underEdge!==null){
      if(overEdge>=underEdge){lean="OVER";edge=overEdge;odds=overOdds;ip=overIP;hitRate=hr.rate}
      else{lean="UNDER";edge=underEdge;odds=underOdds;ip=underIP;hitRate=1-hr.rate}
    }else if(overEdge!==null){lean="OVER";edge=overEdge;odds=overOdds;ip=overIP;hitRate=hr.rate}
    else{lean="UNDER";edge=underEdge;odds=underOdds;ip=underIP;hitRate=1-hr.rate}
    if(edge===null)continue;
    const pT=st.tonight.find(t=>t.PLAYER_NAME===name)||{};
    bets.push({name,metric,line,lean,edge,odds,impliedProb:ip,hitRate,hits:lean==="OVER"?hr.hits:hr.total-hr.hits,total:hr.total,team:pT.TEAM_ABBREVIATION||"",opp:pT.TONIGHT_OPP||"",dkLine:p.DK_LINE,overOdds:p.OVER_ODDS,underOdds:p.UNDER_ODDS});
  }
  bets.sort((a,b)=>b.edge-a.edge);
  return bets;
}

function getStreaks(){
  const streaks=[];
  const STREAK_TYPES=[
    {key:"PTS",threshold:25,label:"Scoring",emoji:"🔥",desc:"25+ PTS"},
    {key:"PTS",threshold:30,label:"Elite Scoring",emoji:"🔥🔥",desc:"30+ PTS"},
    {key:"PRA",threshold:30,label:"PRA Streak",emoji:"💎",desc:"30+ PRA"},
    {key:"PRA",threshold:40,label:"Stuffing Stats",emoji:"💎💎",desc:"40+ PRA"},
    {key:"AST",threshold:8,label:"Dime Streak",emoji:"🎯",desc:"8+ AST"},
    {key:"REB",threshold:10,label:"Board Streak",emoji:"💪",desc:"10+ REB"},
    {key:"FG3M",threshold:3,label:"Sniper",emoji:"🎯",desc:"3+ 3PM"},
    {key:"FG3M",threshold:4,label:"Heat Check",emoji:"🎯🔥",desc:"4+ 3PM"},
    {key:"STOCKS",threshold:3,label:"Defensive",emoji:"🛡️",desc:"3+ STL+BLK"},
    {key:"DK_FP",threshold:40,label:"Fantasy",emoji:"⚡",desc:"40+ DK FP"},
  ];
  const tonightNames=new Set(st.tonight.map(p=>p.PLAYER_NAME).filter(Boolean));
  const tonightMap=new Map();st.tonight.forEach(p=>{if(p.PLAYER_NAME)tonightMap.set(p.PLAYER_NAME,p)});
  for(const sT of STREAK_TYPES){for(const name of tonightNames){
    const logs=getPlayerLogs(name);if(logs.length<3)continue;
    let streak=0;for(const g of logs){if(toNum(g[sT.key])>=sT.threshold)streak++;else break}
    if(streak<3)continue;
    const pT=tonightMap.get(name)||{};
    const recentVals=logs.slice(0,7).map(g=>toNum(g[sT.key]));
    const avgDuring=logs.slice(0,streak).reduce((s,g)=>s+toNum(g[sT.key]),0)/streak;
    const seasAvg=toNum(logs[0][`Seas_${sT.key}`]);
    const prop=st.props.find(pr=>(pr.PLAYER_NAME||"")===name&&pr.METRIC===sT.key);
    streaks.push({player:name,team:pT.TEAM_ABBREVIATION||"",opp:pT.TONIGHT_OPP||"",stat:sT.key,threshold:sT.threshold,streak,label:sT.label,emoji:sT.emoji,desc:sT.desc,avgDuring:avgDuring.toFixed(1),seasAvg:seasAvg.toFixed(1),recentVals,dkLine:prop?prop.DK_LINE:null,overOdds:prop?parseInt(prop.OVER_ODDS)||null:null});
  }}
  const best={};for(const s of streaks){const k=`${s.player}|${s.stat}|${s.threshold}`;if(!best[k]||s.streak>best[k].streak)best[k]=s}
  const result=Object.values(best);result.sort((a,b)=>b.streak-a.streak);return result;
}

function getDraftBoard(){
  const board=[];const aiMap=new Map();st.aiPicks.forEach(p=>{if(p.player)aiMap.set(p.player,p)});
  for(const p of st.tonight){
    const name=p.PLAYER_NAME;if(!name)continue;const logs=getPlayerLogs(name);const most=logs[0]||{};
    const seasPTS=toNum(most.Seas_PTS),seasREB=toNum(most.Seas_REB),seasAST=toNum(most.Seas_AST);
    const seasSTL=toNum(most.Seas_STL),seasBLK=toNum(most.Seas_BLK),seasTOV=toNum(most.Seas_TOV);
    const projUD=seasPTS*1.0+seasREB*1.2+seasAST*1.5+seasSTL*3.0+seasBLK*3.0+seasTOV*-1.0;
    const l5PTS=toNum(most.L5_PTS),l5REB=toNum(most.L5_REB),l5AST=toNum(most.L5_AST);
    const l5STL=toNum(most.L5_STL),l5BLK=toNum(most.L5_BLK),l5TOV=toNum(most.L5_TOV);
    const l5UD=l5PTS*1.0+l5REB*1.2+l5AST*1.5+l5STL*3.0+l5BLK*3.0+l5TOV*-1.0;
    const stocks=seasSTL+seasBLK;const stocksBoost=(stocks*3.0)/(projUD||1);const astBoost=(seasAST*1.5)/(projUD||1);
    const aiPick=aiMap.get(name);const isSmash=aiPick&&(aiPick.confidence||"").toUpperCase()==="SMASH";
    const gameTotal=toNum(p.GAME_TOTAL);
    board.push({name,team:p.TEAM_ABBREVIATION||"",opp:p.TONIGHT_OPP||"",projUD:projUD.toFixed(1),l5UD:l5UD.toFixed(1),seasPTS,seasREB,seasAST,stocks:stocks.toFixed(1),stocksBoost,astBoost,gameTotal,spread:p.SPREAD,isSmash,gamesPlayed:logs.length});
  }
  board.sort((a,b)=>parseFloat(b.projUD)-parseFloat(a.projUD));return board;
}

      let filtered=allStreaks;
      if(st.streakFilter==="fire")filtered=filtered.filter(s=>s.streak>=5);
      if(st.streakFilter==="pts")filtered=filtered.filter(s=>s.stat==="PTS");
      if(st.streakFilter==="pra")filtered=filtered.filter(s=>s.stat==="PRA");
      if(st.streakFilter==="reb")filtered=filtered.filter(s=>s.stat==="REB");
      if(st.streakFilter==="ast")filtered=filtered.filter(s=>s.stat==="AST");
      if(st.streakFilter==="3pm")filtered=filtered.filter(s=>s.stat==="FG3M");
      picksHTML=subTabs;
      if(!allStreaks.length){picksHTML+=`<div class="no-data" style="padding:40px;text-align:center">No active streaks.</div>`}
      else{
        picksHTML+=`<div style="padding:12px 16px 4px;color:#eab308;font-size:13px;font-weight:700">🔥 Active Streaks</div>
        <div class="streak-filters">${filters.map(f=>`<div class="sf-btn ${st.streakFilter===f.k?"active":""}" onclick="setStreakFilter('${f.k}')">${f.l}</div>`).join("")}</div>
        <div style="padding:0 16px;color:#9ca3af;font-size:10px;margin-bottom:6px">${filtered.length} streak${filtered.length!==1?"s":""}</div><div class="cards-grid">`;
        picksHTML+=filtered.map(s=>{
          const heat=getStreakHeat(s.streak);const chart=streakMiniChart(s.recentVals,s.threshold);
          return`<div class="streak-card ${heat.cls}">
            <div class="streak-top"><div style="flex:1"><div><span class="streak-player">${esc(s.player)}</span><span class="streak-heat" style="background:${heat.color}18;color:${heat.color};border:1px solid ${heat.color}35">${s.emoji} ${heat.label}</span></div><div class="streak-info">${esc(s.team)} vs ${esc(s.opp)}</div></div><div><div class="streak-count" style="color:${heat.color}">${s.streak}</div><div class="streak-count-label">${s.desc}</div></div></div>
            <div class="streak-stats"><div class="streak-stat"><div class="streak-stat-label">Threshold</div><div class="streak-stat-val" style="color:#ffd966">${s.stat} ≥ ${s.threshold}</div></div><div class="streak-stat-divider"></div><div class="streak-stat"><div class="streak-stat-label">Avg During</div><div class="streak-stat-val" style="color:#22c55e">${s.avgDuring}</div></div><div class="streak-stat-divider"></div><div class="streak-stat"><div class="streak-stat-label">Season</div><div class="streak-stat-val" style="color:#bbb">${s.seasAvg}</div></div><div class="streak-stat-divider"></div><div><div class="streak-chart">${chart}</div></div></div>
            ${s.dkLine!==null?`<div style="margin-top:6px;font-size:10px;color:#d1d5db">DK: ${s.dkLine} ${s.stat} · Over: ${s.overOdds?fmtOdds(s.overOdds):"—"}</div>`:""}
            <div class="streak-action"><div class="streak-dash-btn" onclick="streakToDash('${esc(s.player)}')">📊 View Dashboard</div></div>
          </div>`;
        }).join("")+`</div>`;
      }
    }else if(picksView==="props"){
      const allM=[...new Set(st.props.map(p=>p.METRIC).filter(Boolean))].sort();
      const fil=st.propsMetric==="ALL"?st.props:st.props.filter(p=>p.METRIC===st.propsMetric);
      const srch=st.propsSearch?fil.filter(p=>(p.PLAYER_NAME||"").toLowerCase().includes(st.propsSearch.toLowerCase())):fil;
      const sorted=[...srch].sort((a,b)=>(a.PLAYER_NAME||"").localeCompare(b.PLAYER_NAME||"")).slice(0,200);
      picksHTML=subTabs+`
      <div style="padding:8px 16px"><input type="text" id="propsSearchInput" placeholder="Search player..." value="${esc(st.propsSearch)}"/></div>
      <div class="props-filter"><div class="pf-btn ${st.propsMetric==="ALL"?"active":""}" onclick="setPropsMetric('ALL')">All</div>${allM.map(m=>`<div class="pf-btn ${st.propsMetric===m?"active":""}" onclick="setPropsMetric('${m}')">${m}</div>`).join("")}</div>
      <div style="padding:0 16px;color:#9ca3af;font-size:10px;margin-bottom:4px">${srch.length} props${srch.length>200?" (showing 200)":""}</div>
      <div class="props-tbl-wrap"><table><thead><tr><th>Player</th><th>Prop</th><th>Line</th><th>Over</th><th>Under</th><th>Hit%</th><th>Edge</th></tr></thead><tbody>${sorted.map(p=>{
        const hr=getHitRate(p.PLAYER_NAME,p.METRIC,parseFloat(p.DK_LINE));
        const oIP=impliedProb(parseInt(p.OVER_ODDS));
        const hrPct=hr?`${(hr.rate*100).toFixed(0)}%`:"—";
        const edgeVal=hr&&oIP!==null?hr.rate-oIP:null;
        const edgeStr=edgeVal!==null?`<span class="ev-badge ${edgeVal>0.08?"ev-pos":edgeVal>0?"ev-neutral":"ev-neg"}">${edgeVal>0?"+":""}${(edgeVal*100).toFixed(0)}%</span>`:"—";
        return`<tr><td style="text-align:left;font-weight:600">${esc(p.PLAYER_NAME)}</td><td><span style="color:#eab308;font-weight:600">${p.METRIC}</span></td><td style="font-weight:700">${p.DK_LINE}</td><td class="${parseInt(p.OVER_ODDS)<=-130?"odds-over":parseInt(p.OVER_ODDS)>=130?"odds-under":"odds-even"}">${fmtOdds(p.OVER_ODDS)}</td><td class="${parseInt(p.UNDER_ODDS)<=-130?"odds-over":parseInt(p.UNDER_ODDS)>=130?"odds-under":"odds-even"}">${fmtOdds(p.UNDER_ODDS)}</td><td style="font-weight:600">${hrPct}</td><td>${edgeStr}</td></tr>`}).join("")}</tbody></table></div>`;
    }
  }

  // ═══ ASSEMBLE ═══
  const showHeader=activeTab==="dashboard"||activeTab==="gamelog";
  app.innerHTML=`
  <div class="header">
    <div class="header-top"><div class="header-title">🏀 NBA DFS Dashboard</div><button class="refresh-btn" id="refreshBtn">↻ Refresh</button></div>
    <div class="top-nav">
      <button class="tab-btn ${activeTab==="dashboard"?"active":""}" onclick="switchTab('dashboard')">📊 Dash</button>
      <button class="tab-btn ${activeTab==="gamelog"?"active":""}" onclick="switchTab('gamelog')">📋 Log</button>
      <button class="tab-btn ${activeTab==="picks"?"active":""}" onclick="switchTab('picks')">🔥 Picks</button>
      <button class="tab-btn ${activeTab==="method"?"active":""}" onclick="switchTab('method')">ℹ️ Info</button>
    </div>
    ${showHeader?`<div class="header-controls"><select id="playerSelect">${playerOpts}</select>
    <select id="metricSelect">${metricOpts}</select>
    <input type="number" id="lineInput" value="${line}" placeholder="Line" step="0.5" inputmode="decimal"/></div>`:""}
  </div>

  <div class="page ${activeTab==="dashboard"?"active":""}">
    <div class="stats-strip"><div class="stats-strip-inner">${statStrip}</div></div>
    <div class="dash-grid">
    <div class="section"><div class="label">Game Log — ${metric}</div><div class="bar-chart">${bars}</div>${lineNum?`<div class="line-indicator">Line: ${lineNum}</div>`:""}</div>
    <div class="section"><div class="label">Averages</div><div class="avg-cards">${avgs}</div></div>
    <div class="section"><div class="split-row">
      <div class="split-card"><span class="split-title">H2H vs ${esc(pT.TONIGHT_OPP||"—")}</span><div class="mini-bars-container">${h2hBars}</div></div>
      <div class="split-card"><span class="split-title">Home / Away</span><div class="mini-bars-container">${hrBars}</div></div>
    </div></div>
    <div class="section"><div class="card"><div class="card-title">⚡ Vegas</div>
      <div class="vegas-row"><span class="vegas-key">${esc(pT.TEAM_ABBREVIATION||"—")} vs ${esc(pT.TONIGHT_OPP||"—")}</span><span style="color:#22c55e;font-size:12px;font-weight:600">${pT.SPREAD?`Spread: ${pT.SPREAD}`:"—"}</span></div>
      <div class="vegas-row"><span class="vegas-key">Team Total</span><span class="vegas-val">${pT.IMPLIED_TOTAL||"—"}</span></div>
      <div class="vegas-row"><span class="vegas-key">Opp Total</span><span class="vegas-val">${pT.OPP_IMPLIED_TOTAL||"—"}</span></div>
      <div class="vegas-row"><span class="vegas-key">Game Total</span><span class="vegas-val">${pT.GAME_TOTAL||"—"}</span></div>
    </div></div>
    <div class="section"><div class="card"><div class="card-title">🎰 DK Props — ${metric}</div>
      ${prop.DK_LINE?`<div class="dk-line">Line: ${prop.DK_LINE}</div><div class="dk-odds"><span style="color:#22c55e;font-size:12px">${overOdds?`Over: ${fmtOdds(overOdds)} (${(overImpl*100).toFixed(1)}%)`:"—"}</span><span style="color:#ef4444;font-size:12px">${underOdds?`Under: ${fmtOdds(underOdds)} (${(underImpl*100).toFixed(1)}%)`:"—"}</span></div>`:`<div class="no-data" style="margin-bottom:8px">No DK line available</div>`}
      ${lineNum?`<div class="hit-row" style="border-top:1px solid #333;padding-top:8px;margin-top:4px"><span class="hit-key">L5</span><span class="hit-val">${hL5} / 5</span></div><div class="hit-row"><span class="hit-key">L10</span><span class="hit-val">${hL10} / 10</span></div><div class="hit-row"><span class="hit-key">Season</span><span class="hit-val">${hS} / ${allLogs.length} (${sRate!==null?(sRate*100).toFixed(0):"—"}%)${pushS>0?` · ${pushS} push`:""}</span></div>`:""}
    </div></div>
    ${edge!==null&&edge>0?`<div class="section dash-full"><div class="confidence" style="background:#22c55e22;border:2px solid #22c55e"><div class="conf-label" style="color:#22c55e">+${(edge*100).toFixed(1)}% Edge vs Book</div><div class="conf-edge">Hit rate: ${(sRate*100).toFixed(0)}% · DK implied: ${(overImpl*100).toFixed(0)}%</div></div></div>`:""}
    </div>
    <div class="timestamp">Data: ${esc(lastUp)}${st.loadedAt?` · Loaded: ${st.loadedAt}`:""}</div>
    <div class="timestamp" style="color:#555;font-size:9px;padding-top:0">Made by S. Krolikowski w/ Claude · 2026</div>
  </div>

  <div class="page ${activeTab==="gamelog"?"active":""}">${logHTML}</div>
  <div class="page ${activeTab==="picks"?"active":""}">${picksHTML}</div>

  <div class="page ${activeTab==="method"?"active":""}">
    <div style="padding:16px">
      <div style="text-align:center;margin-bottom:16px"><div style="font-size:28px;margin-bottom:4px">🏀</div><div style="color:#eab308;font-weight:800;font-size:16px">How This Dashboard Works</div><div style="color:#9ca3af;font-size:11px;margin-top:4px">A look under the hood of the NBA DFS Engine</div></div>
      <div class="card" style="margin-bottom:10px"><div class="card-title">📡 Data Sources</div><div style="font-size:12px;color:#d1d5db;line-height:1.6"><div style="margin-bottom:6px"><span style="color:#eab308;font-weight:700">NBA API</span> — Player game logs, team advanced stats, tonight's schedule.</div><div style="margin-bottom:6px"><span style="color:#eab308;font-weight:700">The Odds API</span> — Live DraftKings spreads, totals, and player props across 10+ markets.</div><div><span style="color:#eab308;font-weight:700">Google Sheets</span> — Central warehouse. Engine writes 9+ tabs; app reads live via CSV.</div></div></div>
      <div class="card" style="margin-bottom:10px"><div class="card-title">⚙️ What Gets Calculated</div><div style="font-size:12px;color:#d1d5db;line-height:1.6"><div style="margin-bottom:6px"><span style="color:#eab308;font-weight:700">Rolling Averages</span> — L3, L5, L10, Season. <span style="color:#eab308;font-weight:700">H2H</span> — vs tonight's opponent. <span style="color:#eab308;font-weight:700">Home/Away Splits</span> — location-based.</div><div style="margin-bottom:6px"><span style="color:#eab308;font-weight:700">Teammate Correlations</span> — 2,000+ pairs. <span style="color:#eab308;font-weight:700">FPPM</span> — minutes-adjusted efficiency.</div><div><span style="color:#eab308;font-weight:700">EV% &amp; Line Movement</span> — Hit rate vs implied probability, snapshot comparison between runs.</div></div></div>
      <div class="card" style="margin-bottom:10px"><div class="card-title">🤖 AI Picks — Powered by Gemini</div><div style="font-size:12px;color:#d1d5db;line-height:1.6"><div style="margin-bottom:6px"><span style="color:#eab308;font-weight:700">Google Gemini 2.5 Flash Lite</span> receives season + L5 averages, defensive ratings, pace, H2H, implied totals, and DK lines for 80 active players.</div><div>3-layer injury filter + post-filter for hallucinated players. Returns 14 ranked picks with SMASH/OVER/FADE tiers.</div></div></div>
      <div class="card" style="margin-bottom:10px"><div class="card-title">💰 Best Bets (+EV)</div><div style="font-size:12px;color:#d1d5db;line-height:1.6">Compares season hit rate on every DK prop vs implied probability. Edge = hit rate − book's implied odds. Positive edge = you have value the book is underpricing.</div></div>
      <div class="card" style="margin-bottom:10px;border:1px solid #333"><div class="card-title">🙏 Credits</div><div style="font-size:12px;color:#d1d5db;line-height:1.6"><div style="margin-bottom:4px">Built by <span style="color:#eab308;font-weight:700">Stephen Krolikowski</span></div><div style="margin-bottom:4px">AI Picks: <span style="color:#eab308;font-weight:700">Google Gemini 2.5 Flash Lite</span></div><div style="margin-bottom:4px">App &amp; pipeline: <span style="color:#eab308;font-weight:700">Claude</span> by Anthropic</div><div style="margin-bottom:4px">Props: <span style="color:#eab308;font-weight:700">The Odds API</span> (DraftKings)</div><div>Data: <span style="color:#eab308;font-weight:700">nba_api</span> (stats.nba.com)</div></div></div>
      <div style="text-align:center;color:#555;font-size:9px;padding:8px 0 20px">For entertainment &amp; research purposes only.</div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn ${activeTab==="dashboard"?"active":""}" onclick="switchTab('dashboard')">📊 Dash</button>
    <button class="tab-btn ${activeTab==="gamelog"?"active":""}" onclick="switchTab('gamelog')">📋 Log</button>
    <button class="tab-btn ${activeTab==="picks"?"active":""}" onclick="switchTab('picks')">🔥 Picks</button>
    <button class="tab-btn ${activeTab==="method"?"active":""}" onclick="switchTab('method')">ℹ️ Info</button>
  </div>`;

  document.getElementById("playerSelect")?.addEventListener("change",e=>{st.player=e.target.value;st.oppFilter="";const p=st.props.find(pr=>pr.PLAYER_NAME===st.player&&pr.METRIC===st.metric);st.line=p?.DK_LINE||"";cache.player=null;render()});
  document.getElementById("metricSelect")?.addEventListener("change",e=>{st.metric=e.target.value;const p=st.props.find(pr=>pr.PLAYER_NAME===st.player&&pr.METRIC===st.metric);st.line=p?.DK_LINE||"";render()});
  document.getElementById("lineInput")?.addEventListener("input",e=>{st.line=e.target.value;render()});
  document.getElementById("refreshBtn")?.addEventListener("click",loadAllData);
  document.getElementById("oppFilter")?.addEventListener("change",e=>{st.oppFilter=e.target.value;render()});
  document.getElementById("propsSearchInput")?.addEventListener("input",e=>{st.propsSearch=e.target.value;render()});
  document.querySelectorAll(".ai-pick-card[data-ai-idx]").forEach(c=>{c.addEventListener("click",()=>{const pk=aiPicks[parseInt(c.dataset.aiIdx)];if(pk){st.player=pk.player;st.metric=pk.prop_type||"PTS";st.line=String(pk.line||"");cache.player=null;switchTab("dashboard")}})});
}

function loadAllData(){
  st.loading=true;st.error=null;cache.player=null;cache.sortedLogs=null;render();
  Promise.all([
    fetchSheet("Tonights_Opponent").catch(()=>null),
    fetchSheet("Player_Stats").catch(()=>null),
    fetchSheet("DK_Player_Props").catch(()=>[]),
    fetchSheet("Home_Away_Splits").catch(()=>[]),
    fetchSheet("Daily_Picks").catch(()=>[])
  ]).then(([tonight,stats,props,splits,picks])=>{
    if(!tonight||!stats){st.error="Could not load critical sheets.";st.loading=false;render();return}
    st.tonight=tonight;st.playerStats=stats;st.props=props||[];st.splits=splits||[];
    // Filter picks to today only (Daily_Picks now appends)
    const today=new Date().toISOString().slice(0,10);
    st.aiPicks=(picks||[]).filter(p=>(p.DATE||"")===today).sort((a,b)=>toNum(a.rank)-toNum(b.rank));
    st.loading=false;st.loadedAt=new Date().toLocaleTimeString();
    if(tonight.length>0&&!st.player){st.player=tonight[0].PLAYER_NAME||"";const p=st.props.find(pr=>pr.PLAYER_NAME===st.player&&pr.METRIC===st.metric);st.line=p?.DK_LINE||""}
    st.streaks=getStreaks();render();
  }).catch(()=>{st.loading=false;st.error="Could not load data. Make sure your Google Sheet is set to 'Anyone with the link can view'.";render()});
}
loadAllData();
</script>
</body>
</html>
