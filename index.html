<script>
const SHEET_ID="1AAwSwFCGIqS6JGdYTdkSau91BtnM_sMdWl2By5A9nFQ";
const METRICS=["H","HR","RBI","R","SB","SO","BB","TB","2B","DK_FP"];
const P_METRICS=["IP","SO","ER","H","HR","BB","DK_FP","PC","W","L"];
const MLB_API="https://statsapi.mlb.com/api/v1";

let st={
  tonight:[],gameLogs:[],splits:[],weather:[],pitchers:[],schedule:[],
  pTonight:[],pGameLogs:[],pSplits:[],
  picks:[],props:[],
  mode:"batter",
  player:"",metric:"H",line:"",activeTab:"dashboard",oppFilter:"",
  playerSearch:"",playerSuggestions:[],showPlayerSugs:false,
  loading:true,error:null,
  picksView:"picks",propsMetric:"ALL",propsSearch:"",
  streakFilter:"all",drafted:new Set(),
  lkPlayer:null,lkResults:[],lkSubTab:"career",lkPlayerType:"batter",
  lkCareer:null,lkYby:null,lkVsTeamStats:null,lkVsPlayerId:null,
  lkVsPlayerName:"",lkVsPlayerResults:[],lkVsPlayerStats:null,
  lkVsTeamId:null,lkLoading:{},lkTeamList:[]
};

function cleanRows(rows){
  if(!rows||!rows.length)return rows;
  return rows.map(row=>{
    const clean={};
    for(const[k,v]of Object.entries(row)){
      const ck=k.replace(/^\uFEFF/,'').replace(/[\u200B-\u200D\uFEFF]/g,'').trim();
      clean[ck]=v;
    }
    return clean;
  });
}

const fetchSheet=(name)=>new Promise((res,rej)=>{
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
  fetch(url)
  .then(r=>{
    if(!r.ok){console.error("Sheet fetch failed: "+name);throw new Error("Failed: "+name)}
    return r.text()
  })
  .then(text=>{
    Papa.parse(text,{header:true,skipEmptyLines:true,dynamicTyping:true,complete:r=>{
      console.log(name+": "+r.data.length+" rows");
      res(r.data);
    },error:e=>rej(e)});
  })
  .catch(e=>rej(e));
});

const toNum=v=>{const n=parseFloat(v);return isNaN(n)?0:n};

function firstValidPlayer(arr){

function getDingerCombos(board,legs){
  if(board.length<legs)return[];
  const combos=[];
  function gen(start,current){
    if(current.length===legs){const teams=current.map(d=>d.team);if(new Set(teams).size===legs){combos.push({players:current.slice(),score:current.reduce((s,d)=>s+d.score,0),teams});}return;}
    for(let i=start;i<board.length&&combos.length<500;i++){current.push(board[i]);gen(i+1,current);current.pop();}
  }
  gen(0,[]);combos.sort((a,b)=>b.score-a.score);return combos.slice(0,10);
}

// *** FIXED getDingerBoard - uses game log AB instead of Seas_AB column ***
function getDingerBoard(){
  const rows=[];
  for(const p of st.tonight){
    const name=p.player_name;if(!name)continue;
    const pLogs=st.gameLogs.filter(g=>g.player_name===name);
    const totalAB=pLogs.reduce((s,g)=>s+toNum(g.AB),0);
    if(totalAB===0)continue;
    const seasHR=toNum(p.Seas_HR);
    const l7HR=toNum(p.L7_HR);
    const l14HR=toNum(p.L14_HR);
    const seasHRtotal=pLogs.reduce((s,g)=>s+toNum(g.HR),0);
    const hrRate=seasHRtotal/totalAB;
    const gamesPlayed=pLogs.length;
    const hrPerGame=gamesPlayed>0?seasHRtotal/gamesPlayed:0;
    const hrProp=st.props.find(pr=>(pr.PLAYER_NAME||"").toLowerCase()===name.toLowerCase()&&pr.METRIC==="HR");
    const dkLine=hrProp?hrProp.DK_LINE:null;
    const overOdds=hrProp?parseInt(hrProp.OVER_ODDS)||null:null;
    let score=0;
    score+=hrRate*100;score+=l7HR*15;score+=l14HR*8;score+=seasHR*5;score+=hrPerGame*20;
    if(overOdds&&overOdds<0)score+=10;
    if(overOdds&&overOdds>0&&overOdds<=200)score+=5;
    rows.push({name,team:p.team_abbr||"",opp:p.opp_abbr_tonight||"",pitcher:p.opp_pitcher_name||"TBD",hand:p.opp_pitcher_hand||"?",venue:p.venue_tonight||"",seasHR:seasHRtotal,totalAB,hrRate,hrPerGame,gamesPlayed,l7HR,l14HR,seasAvgHR:seasHR,dkLine,overOdds,score});
  }
  rows.sort((a,b)=>b.score-a.score);return rows.slice(0,30);
}

// *** getDraftBoard with NaN guards ***
function getDraftBoard(){
  const board=[];
  const aiMap=new Map();
  st.picks.forEach(p=>{if(p.player)aiMap.set(p.player.toLowerCase(),p)});
  for(const p of st.tonight){
    const name=p.player_name;if(!name)continue;
    const logs=st.gameLogs.filter(g=>g.player_name===name).sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
    if(!logs.length)continue;
    const most=logs[0]||{};
    const sH=toNum(most.Seas_H),sHR=toNum(most.Seas_HR),s2B=toNum(most.Seas_2B);
    const sTB=toNum(most.Seas_TB),sRBI=toNum(most.Seas_RBI),sR=toNum(most.Seas_R);
    const sSB=toNum(most.Seas_SB),sBB=toNum(most.Seas_BB);
    const s3B=Math.max(0,(sTB-sH-s2B-3*sHR)/2)||0;
    const s1B=Math.max(0,sH-s2B-s3B-sHR)||0;
    const projUD=(s1B*3+s2B*6+s3B*8+sHR*10+sBB*3+sRBI*2+sR*2+sSB*4)||0;
    const l7H=toNum(most.L7_H),l7HR=toNum(most.L7_HR),l72B=toNum(most.L7_2B);
    const l7TB=toNum(most.L7_TB),l7RBI=toNum(most.L7_RBI),l7R=toNum(most.L7_R);
    const l7SB=toNum(most.L7_SB),l7BB=toNum(most.L7_BB);
    const l73B=Math.max(0,(l7TB-l7H-l72B-3*l7HR)/2)||0;
    const l71B=Math.max(0,l7H-l72B-l73B-l7HR)||0;
    const l7UD=(l71B*3+l72B*6+l73B*8+l7HR*10+l7BB*3+l7RBI*2+l7R*2+l7SB*4)||0;
    const aiPick=aiMap.get(name.toLowerCase());
    const isSmash=aiPick&&(aiPick.confidence||"").toUpperCase()==="SMASH";
    let pos="FLEX";const posRaw=(p.position||"").toUpperCase();
    if(posRaw.includes("C")||posRaw.includes("1B")||posRaw.includes("2B")||posRaw.includes("3B")||posRaw.includes("SS"))pos="IF";
    else if(posRaw.includes("OF")||posRaw.includes("LF")||posRaw.includes("CF")||posRaw.includes("RF"))pos="OF";
    board.push({name,team:p.team_abbr||"",opp:p.opp_abbr_tonight||"",pitcher:p.opp_pitcher_name||"TBD",hand:p.opp_pitcher_hand||"?",venue:p.venue_tonight||"",projUD:projUD.toFixed(1),l7UD:l7UD.toFixed(1),sH,sHR,sRBI,sR,sSB,sBB,isSmash,aiPick,isPitcher:false,pos,gamesPlayed:logs.length});
  }
  for(const p of st.pTonight){
    const name=p.player_name;if(!name)continue;
    const logs=st.pGameLogs.filter(g=>g.player_name===name).sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
    if(!logs.length)continue;const most=logs[0]||{};
    const sSO=toNum(most.Seas_SO),sER=toNum(most.Seas_ER),sW=toNum(most.Seas_W),sIP=toNum(most.Seas_IP);
    const qsGames=logs.filter(g=>toNum(g.IP)>=6&&toNum(g.ER)<=3).length;
    const qsRate=logs.length>0?qsGames/logs.length:0;
    const projUD=(sW*2+qsRate*3+sSO*1+sIP*1+sER*(-1))||0;
    const l3SO=toNum(most.L3_SO),l3ER=toNum(most.L3_ER),l3W=toNum(most.L3_W),l3IP=toNum(most.L3_IP);
    const l3QS=logs.slice(0,3).filter(g=>toNum(g.IP)>=6&&toNum(g.ER)<=3).length/Math.max(1,Math.min(3,logs.length));
    const l3UD=(l3W*2+l3QS*3+l3SO*1+l3IP*1+l3ER*(-1))||0;
    const aiPick=aiMap.get(name.toLowerCase());const isSmash=aiPick&&(aiPick.confidence||"").toUpperCase()==="SMASH";
    board.push({name,team:p.team_abbr||"",opp:p.opp_abbr_tonight||"",pitcher:"",hand:"",venue:p.venue_tonight||"",projUD:projUD.toFixed(1),l7UD:l3UD.toFixed(1),sSO,sER,sW,sIP,qsRate,isSmash,aiPick,isPitcher:true,pos:"P",gamesPlayed:logs.length});
  }
  board.sort((a,b)=>parseFloat(b.projUD)-parseFloat(a.projUD));return board;
}

function getStreaks(){
  const streaks=[];
  const BAT=[{key:"H",threshold:1,label:"Hit Streak",emoji:"\ud83d\udd25",type:"bat",desc:"games w/ a hit"},{key:"HR",threshold:1,label:"HR Streak",emoji:"\ud83d\udca3",type:"bat",desc:"games w/ a HR"},{key:"H",threshold:2,label:"Multi-Hit",emoji:"\ud83d\udd25\ud83d\udd25",type:"bat",desc:"games w/ 2+ hits"},{key:"RBI",threshold:1,label:"RBI Streak",emoji:"\ud83d\udcb0",type:"bat",desc:"games w/ an RBI"},{key:"TB",threshold:3,label:"Power Surge",emoji:"\u26a1",type:"bat",desc:"games w/ 3+ TB"},{key:"R",threshold:1,label:"Runs Streak",emoji:"\ud83c\udfc3",type:"bat",desc:"games scoring a run"},{key:"SB",threshold:1,label:"SB Streak",emoji:"\ud83d\udca8",type:"bat",desc:"games w/ a steal"}];
  const tonightNames=new Set(st.tonight.map(p=>p.player_name).filter(Boolean));
  for(const sType of BAT){for(const name of tonightNames){
    const logs=st.gameLogs.filter(g=>g.player_name===name).sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
    if(logs.length<3)continue;let streak=0;
    for(const g of logs){if(toNum(g[sType.key])>=sType.threshold)streak++;else break;}
    if(streak<3)continue;
    const pT=st.tonight.find(t=>t.player_name===name)||{};
    const recentVals=logs.slice(0,7).map(g=>toNum(g[sType.key]));
    const avgDuring=(logs.slice(0,streak).reduce((s,g)=>s+toNum(g[sType.key]),0)/streak)||0;
    const seasAvg=toNum(logs[0][`Seas_${sType.key}`]);
    const prop=st.props.find(pr=>(pr.PLAYER_NAME||"").toLowerCase()===name.toLowerCase()&&pr.METRIC===sType.key);
    streaks.push({player:name,team:pT.team_abbr||"",opp:pT.opp_abbr_tonight||"",pitcher:pT.opp_pitcher_name||"TBD",hand:pT.opp_pitcher_hand||"?",venue:pT.venue_tonight||"",stat:sType.key,threshold:sType.threshold,streak,label:sType.label,emoji:sType.emoji,propType:sType.type,desc:sType.desc,avgDuring:avgDuring.toFixed(2),seasAvg:seasAvg.toFixed(2),recentVals,dkLine:prop?prop.DK_LINE:null,overOdds:prop?parseInt(prop.OVER_ODDS)||null:null});
  }}
  const PIT=[{key:"SO",threshold:6,label:"K Streak",emoji:"\ud83d\udd25",type:"pitch",desc:"starts w/ 6+ K"},{key:"SO",threshold:8,label:"Elite K",emoji:"\u26a1",type:"pitch",desc:"starts w/ 8+ K"},{key:"ER",threshold:2,label:"Lockdown",emoji:"\ud83d\udd12",type:"pitch",compare:"lte",desc:"starts w/ \u22642 ER"},{key:"W",threshold:1,label:"Win Streak",emoji:"\ud83d\udc51",type:"pitch",desc:"consecutive wins"}];
  const pNames=new Set(st.pTonight.map(p=>p.player_name).filter(Boolean));
  for(const sType of PIT){for(const name of pNames){
    const logs=st.pGameLogs.filter(g=>g.player_name===name).sort((a,b)=>(b.game_date||"").localeCompare(a.game_date||""));
    if(logs.length<2)continue;let streak=0;const isLte=sType.compare==="lte";
    for(const g of logs){const v=toNum(g[sType.key]);if(isLte?v<=sType.threshold:v>=sType.threshold)streak++;else break;}
    if(streak<2)continue;
    const pT=st.pTonight.find(t=>t.player_name===name)||{};
    const recentVals=logs.slice(0,7).map(g=>toNum(g[sType.key]));
    const avgDuring=(logs.slice(0,streak).reduce((s,g)=>s+toNum(g[sType.key]),0)/streak)||0;
    const seasAvg=toNum(logs[0][`Seas_${sType.key}`])||toNum(logs[0][`L7_${sType.key}`]);
    const prop=st.props.find(pr=>(pr.PLAYER_NAME||"").toLowerCase()===name.toLowerCase()&&pr.METRIC===sType.key);
    streaks.push({player:name,team:pT.team_abbr||"",opp:pT.opp_abbr_tonight||"",pitcher:"",hand:"",venue:pT.venue_tonight||"",stat:sType.key,threshold:sType.threshold,streak,label:sType.label,emoji:sType.emoji,propType:sType.type,desc:sType.desc,isLte,avgDuring:avgDuring.toFixed(2),seasAvg:seasAvg.toFixed(2),recentVals,dkLine:prop?prop.DK_LINE:null,overOdds:prop?parseInt(prop.OVER_ODDS)||null:null});
  }}
  const best={};for(const s of streaks){const k=`${s.player}|${s.stat}|${s.threshold}`;if(!best[k]||s.streak>best[k].streak)best[k]=s;}
  return Object.values(best).sort((a,b)=>b.streak-a.streak);
}

  <div class="tab-bar">
    <button class="tab-btn ${activeTab==="dashboard"?"active":""}" onclick="switchTab('dashboard')">\ud83d\udcca Dash</button>
    <button class="tab-btn ${activeTab==="gamelog"?"active":""}" onclick="switchTab('gamelog')">\ud83d\udccb Log</button>
    <button class="tab-btn ${activeTab==="picks"?"active":""}" onclick="switchTab('picks')">\ud83c\udfaf Picks</button>
    <button class="tab-btn ${activeTab==="lookup"?"active":""}" onclick="switchTab('lookup')">\ud83d\udd0d Lookup</button>
  </div>`;

  const ps=document.getElementById("playerSelect");if(ps)ps.onchange=e=>{st.player=e.target.value;st.oppFilter="";render()};
  const ms=document.getElementById("metricSel");if(ms)ms.onchange=e=>{st.metric=e.target.value;render()};
  const li=document.getElementById("lineInput");if(li)li.onchange=e=>{st.line=e.target.value;render()};
  const of=document.getElementById("oppFilter");if(of)of.onchange=e=>{st.oppFilter=e.target.value;render()};
  const lkS=document.getElementById("lkSearch");if(lkS)lkS.oninput=e=>{clearTimeout(window._lkT);window._lkT=setTimeout(()=>searchLkPlayers(e.target.value),300)};
  const psi=document.getElementById("propsSearchInput");if(psi)psi.oninput=e=>{st.propsSearch=e.target.value;render()};
  restoreFocus(focus);
}

async function searchLkPlayers(q){if(q.length<2)return;try{const d=await mlbFetch(`${MLB_API}/people/search?names=${encodeURIComponent(q)}&sportId=1&hydrate=currentTeam&limit=10`);console.log("Lookup:",d.people?.length,"results")}catch(e){}}

Promise.all([
  fetchSheet("Tonights_Batters"),fetchSheet("Batter_Game_Logs"),
  fetchSheet("Home_Away_Splits").catch(()=>[]),fetchSheet("Venue_Weather").catch(()=>[]),
  fetchSheet("Tonights_Pitchers").catch(()=>[]),fetchSheet("Tonights_Schedule").catch(()=>[]),
  fetchSheet("Tonights_Starters").catch(()=>[]),fetchSheet("Pitcher_Game_Logs").catch(()=>[]),
  fetchSheet("Pitcher_Home_Away").catch(()=>[]),fetchSheet("Daily_Picks").catch(()=>[]),
  fetchSheet("DK_Player_Props").catch(()=>[])
]).then(([tonight,logs,splits,weather,pitchers,schedule,pTonight,pLogs,pSplits,picks,props])=>{
  st.tonight=cleanRows(tonight);st.gameLogs=cleanRows(logs);st.splits=cleanRows(splits);
  st.weather=cleanRows(weather);st.pitchers=cleanRows(pitchers);st.schedule=cleanRows(schedule);
  st.pTonight=cleanRows(pTonight);st.pGameLogs=cleanRows(pLogs);st.pSplits=cleanRows(pSplits);
  st.picks=cleanRows(picks);st.props=cleanRows(props);
  st.loading=false;st.mode="batter";st.metric="H";st.player=firstValidPlayer(st.tonight);
  if(!st.player&&st.pTonight.length>0){st.mode="pitcher";st.metric="SO";st.player=firstValidPlayer(st.pTonight);}
  render();
}).catch(err=>{console.error("Load failed:",err);st.loading=false;st.error="Could not load data.";render();});
</script>
