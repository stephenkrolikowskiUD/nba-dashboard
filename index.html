<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>NBA DFS Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#fff;font-family:system-ui,-apple-system,sans-serif;max-width:480px;margin:0 auto;padding-bottom:60px}
select,input{background:#2a2a2a;color:#fff;border:1px solid #444;border-radius:8px;padding:8px 10px;font-size:14px;width:100%}
input::placeholder{color:#888}
.header{background:#1a1a1a;padding:12px 16px;border-bottom:1px solid #333;position:sticky;top:0;z-index:10}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.header-title{color:#eab308;font-weight:700;font-size:13px}
.refresh-btn{background:none;border:1px solid #444;border-radius:6px;color:#9ca3af;font-size:11px;padding:4px 10px;cursor:pointer}
.row{display:flex;gap:8px;margin-top:8px}
.row select,.row input{flex:1}
.section{padding:14px 16px 0}
.label{color:#e5e7eb;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card{background:#1a1a1a;border-radius:10px;padding:12px 14px}
.card-title{color:#eab308;font-weight:700;font-size:13px;margin-bottom:8px}
.stats-strip{background:#1a1a1a;padding:10px 16px;border-bottom:1px solid #2a2a2a;overflow-x:auto}
.stats-strip-inner{display:flex;gap:16px;min-width:max-content}
.stat-item{text-align:center;min-width:40px}
.stat-label{color:#d1d5db;font-size:9px;margin-bottom:2px;font-weight:600}
.stat-val{color:#eab308;font-weight:700;font-size:13px}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:90px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center}
.bar-val{font-size:7px;color:#e5e7eb;margin-bottom:1px;font-weight:600}
.bar{width:100%;border-radius:3px 3px 0 0;transition:height .3s,background .3s}
.bar-date{font-size:7px;color:#d1d5db;margin-top:2px}
.line-indicator{border-top:1px dashed #eab308;margin-top:2px;padding-top:2px;font-size:9px;color:#eab308}
.avg-cards{display:flex;gap:8px}
.avg-card{flex:1;background:#1a1a1a;border-radius:8px;padding:10px 4px;text-align:center}
.avg-label{color:#d1d5db;font-size:9px;margin-bottom:4px}
.avg-val{font-weight:700;font-size:15px}
.split-row{display:flex;gap:8px}
.split-card{flex:1;background:#1a1a1a;border-radius:10px;padding:12px}
.split-title{color:#e5e7eb;font-size:10px;font-weight:600;margin-bottom:8px;display:block}
.mini-bars-container{position:relative;height:70px;display:flex;gap:6px;align-items:flex-end}
.mini-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.mini-bar{width:100%;border-radius:3px 3px 0 0;flex-shrink:0}
.mini-bar-label{font-size:8px;color:#d1d5db;margin-top:2px}
.mini-bar-val{font-size:8px;color:#fff;font-weight:600;margin-top:1px}
.vegas-row{display:flex;justify-content:space-between;margin-bottom:4px}
.vegas-key{color:#d1d5db;font-size:12px}
.vegas-val{color:#fff;font-size:12px;font-weight:600}
.dk-line{font-size:16px;font-weight:800;color:#fff;margin-bottom:6px}
.dk-odds{display:flex;justify-content:space-between;margin-bottom:8px}
.hit-row{display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid #333}
.hit-key{color:#d1d5db;font-size:12px}
.hit-val{color:#fff;font-size:12px;font-weight:600}
.confidence{border-radius:10px;padding:14px;text-align:center}
.conf-label{font-size:20px;font-weight:800}
.conf-edge{color:#d1d5db;font-size:11px;margin-top:4px}
.timestamp{text-align:center;padding:8px 16px;color:#9ca3af;font-size:10px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.error{padding:24px;color:#ef4444;font-size:14px}
.no-data{color:#9ca3af;font-size:11px}
.tab-bar{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#1a1a1a;border-top:1px solid #333;display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;padding:12px;text-align:center;font-size:10px;font-weight:600;color:#9ca3af;cursor:pointer;border:none;background:none}
.tab-btn.active{color:#eab308;border-top:2px solid #eab308}
.page{display:none}
.page.active{display:block}
.log-controls{padding:12px 16px}
.log-table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 180px);padding:0 16px 80px}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
thead{position:sticky;top:0;z-index:5}
th{background:#1a1a1a;color:#eab308;font-weight:700;padding:8px 6px;text-align:center;border-bottom:1px solid #333;white-space:nowrap}
th.hl{background:#2a1f00}
td{padding:7px 6px;text-align:center;color:#fff;border-bottom:1px solid #222;white-space:nowrap}
td.hl{color:#eab308;font-weight:700}
td.hit{color:#22c55e;font-weight:700}
td.miss{color:#ef4444;font-weight:700}
td.push{color:#9ca3af;font-weight:700}
tr.win td{background:#0f2a1a}
tr.loss td{background:#2a0f0f}
.wl-w{color:#22c55e;font-weight:700}
.wl-l{color:#ef4444;font-weight:700}
/* Sub-tabs */
.sub-tabs{display:flex;gap:4px;padding:8px 16px;overflow-x:auto}
.sub-tab{padding:8px 14px;font-size:11px;font-weight:600;color:#9ca3af;background:#1a1a1a;border:1px solid #444;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sub-tab.active{color:#eab308;background:#eab30815;border-color:#eab308}
/* AI Picks */
.ai-pick-card{background:#1a1a1a;border-radius:10px;padding:12px 14px;margin:0 16px 8px;border-left:4px solid;cursor:pointer}
.ai-pick-card:active{opacity:.7;transform:scale(.98)}
.ai-rank{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:800;margin-right:8px;flex-shrink:0}
.ai-pick-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ai-pick-player{font-weight:700;font-size:14px;display:flex;align-items:center}
.ai-pick-meta{display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;margin-bottom:4px}
.ai-pick-rationale{font-size:11px;color:#d1d5db;font-style:italic}
.ai-conf-smash{border-left-color:#22c55e}
.ai-conf-over{border-left-color:#eab308}
.ai-conf-fade,.ai-conf-under{border-left-color:#ef4444}
.conf-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.conf-tag-smash{background:#22c55e22;color:#22c55e}
.conf-tag-over{background:#eab30822;color:#eab308}
.conf-tag-fade,.conf-tag-under{background:#ef444422;color:#ef4444}
.picks-summary{display:flex;gap:8px;padding:0 16px 8px}
.ps-card{flex:1;background:#1a1a1a;border-radius:8px;padding:10px;text-align:center}
.ps-val{font-size:18px;font-weight:800;color:#eab308}
.ps-lbl{font-size:9px;color:#d1d5db;margin-top:2px}
/* Stats Edge */
.bet-card{background:#1a1a1a;border-radius:10px;padding:12px 14px;margin:0 16px 8px;border-left:4px solid;cursor:pointer}
.bet-card:active{opacity:.7}
/* Streaks */
.streak-card{background:#1a1a1a;border-radius:10px;padding:12px 14px;margin:0 16px 8px;border-left:3px solid #444;position:relative;overflow:hidden}
.streak-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0}
.streak-card.inferno{border-left-color:#ef4444}.streak-card.inferno::before{background:linear-gradient(90deg,transparent,rgba(239,68,68,.5),transparent);opacity:1}
.streak-card.fire{border-left-color:#ff6b35}.streak-card.fire::before{background:linear-gradient(90deg,transparent,rgba(255,107,53,.4),transparent);opacity:1}
.streak-card.hot{border-left-color:#eab308}.streak-card.hot::before{background:linear-gradient(90deg,transparent,rgba(234,179,8,.3),transparent);opacity:1}
.streak-card.warm{border-left-color:#ffd966}
.streak-top{display:flex;justify-content:space-between;align-items:flex-start}
.streak-player{font-weight:700;font-size:14px}
.streak-heat{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
.streak-count{font-size:26px;font-weight:800;line-height:1;text-align:right}
.streak-count-label{font-size:8px;color:#9ca3af;text-transform:uppercase;letter-spacing:1px;text-align:right;font-weight:700;margin-top:1px}
.streak-info{color:#d1d5db;font-size:11px;margin-top:4px}
.streak-stats{display:flex;gap:8px;padding:8px 10px;background:rgba(0,0,0,.3);border-radius:8px;margin-top:8px;align-items:center;border:1px solid rgba(255,255,255,.03)}
.streak-stat{flex:1;text-align:center}
.streak-stat-label{font-size:8px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.streak-stat-val{font-size:13px;font-weight:700;margin-top:1px}
.streak-stat-divider{border-left:1px solid rgba(255,255,255,.06);height:24px}
.streak-chart{display:flex;align-items:flex-end;gap:2px;height:28px}
.streak-chart-bar{border-radius:2px 2px 0 0;min-width:6px;flex:1}
.streak-action{margin-top:8px}
.streak-dash-btn{width:100%;padding:7px 0;border-radius:6px;border:1px solid #444;background:#1a1a1a;color:#d1d5db;font-size:11px;font-weight:600;cursor:pointer;text-align:center}
.streak-dash-btn:active{background:#333}
.streak-filters{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto}
.sf-btn{padding:5px 10px;font-size:10px;font-weight:700;color:#9ca3af;background:#1a1a1a;border:1px solid #444;border-radius:14px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sf-btn.active{color:#eab308;background:#eab30815;border-color:rgba(234,179,8,.4)}
/* Draft Cheat Sheet */
.draft-card{background:#1a1a1a;border-radius:10px;padding:10px 14px;margin:0 16px 6px;border-left:3px solid #444;display:flex;align-items:center;gap:10px;cursor:pointer;transition:opacity .15s}
.draft-card:active{transform:scale(.98)}
.draft-card.drafted{opacity:.3;text-decoration:line-through}
.draft-card.smash{border-left-color:#22c55e}
.draft-card.tier1{border-left-color:#eab308}
.draft-card.tier2{border-left-color:#3b82f6}
.draft-card.tier3{border-left-color:#8b5cf6}
.draft-rank{font-size:14px;font-weight:800;min-width:24px;text-align:center}
.draft-main{flex:1;min-width:0}
.draft-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.draft-meta{font-size:10px;color:#9ca3af;margin-top:2px}
.draft-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.draft-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:4px}
.draft-fp{text-align:right;min-width:50px}
.draft-fp-val{font-size:18px;font-weight:800}
.draft-fp-lbl{font-size:8px;color:#9ca3af}
.draft-tier-label{padding:8px 16px 4px;font-size:11px;font-weight:700;letter-spacing:1px}
.draft-controls{display:flex;gap:6px;padding:8px 16px;align-items:center}
.draft-reset{background:none;border:1px solid #444;border-radius:6px;color:#9ca3af;font-size:10px;padding:4px 10px;cursor:pointer}
.draft-count{font-size:10px;color:#9ca3af;flex:1;text-align:right}
/* Props browser */
.props-filter{display:flex;gap:6px;padding:8px 16px;overflow-x:auto}
.pf-btn{padding:6px 12px;font-size:11px;font-weight:600;color:#9ca3af;background:#1a1a1a;border:1px solid #444;border-radius:16px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pf-btn.active{color:#eab308;background:#eab30815;border-color:#eab308}
.props-tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:50vh;padding:0 16px 16px}
.props-tbl-wrap table{min-width:320px}
.odds-over{color:#22c55e;font-weight:600}
.odds-under{color:#ef4444;font-weight:600}
.odds-even{color:#f59726;font-weight:600}
</style>

<body>
<div id="app"><div class="loading"><div style="font-size:32px;animation:bounce .8s ease-in-out infinite">🏀</div><div style="color:#666;font-size:14px">Loading dashboard...</div></div></div>
<script>
const SHEET_ID="12gBgVx_RCsIytjZHjfZWgLtG-R-zcPbYYE-CVFd4EDw";
const METRICS=["PTS","REB","AST","PRA","PR","PA","RA","FG3M","STOCKS","DK_FP","FPPM","USAGE_PPM"];
let st={
  tonight:[],playerStats:[],props:[],splits:[],aiPicks:[],
  player:"",metric:"PTS",line:"",
  activeTab:"dashboard",oppFilter:"",
  picksView:"ai",propsMetric:"ALL",propsSearch:"",streakFilter:"all",streaks:[],drafted:new Set(),
  loading:true,error:null,loadedAt:null
};
let cache={player:null,sortedLogs:null,bestBets:null};

const toNum=v=>parseFloat(v)||0;
const impliedProb=o=>{if(!o)return null;const v=parseFloat(o);if(v===0)return null;return v<0?Math.abs(v)/(Math.abs(v)+100):100/(v+100)};
const fmtOdds=v=>{if(!v&&v!==0)return"—";v=parseInt(v);return v>0?`+${v}`:`${v}`};
const barColor=(v,l)=>!l?"#eab308":v>l?"#22c55e":v===l?"#9ca3af":"#ef4444";
const avgColor=(v,l)=>!l?"#eab308":v>=l?"#eab308":"#f97316";
const esc=s=>String(s||"").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const CONF_LEVELS=[
  {min_edge:.10,min_rate:.65,label:"SMASH",stars:5,color:"#22c55e"},
  {min_edge:.05,min_rate:.60,label:"Strong Play",stars:4,color:"#86efac"},
  {min_edge:.00,min_rate:.55,label:"Lean Over",stars:3,color:"#eab308"},
  {min_edge:-.05,min_rate:0,label:"Neutral",stars:0,color:"#9ca3af"},
];
function getConfidence(sR,oI,e){
  if(e===null||sR===null)return null;
  for(const l of CONF_LEVELS)if(e>=l.min_edge&&sR>=l.min_rate){const s=l.stars>0?"⭐".repeat(l.stars)+" ":"⚪ ";return{label:s+l.label,stars:l.stars,color:l.color}}
  return{label:"❌ PASS",stars:-1,color:"#ef4444"};
}
const fetchSheet=n=>new Promise((res,rej)=>{
  fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(n)}`)
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.text()})
  .then(t=>{Papa.parse(t,{header:true,skipEmptyLines:true,dynamicTyping:true,complete:r=>res(r.data),error:rej})})
  .catch(rej);
});

function getPlayerLogs(name){
  if(cache.player===name&&cache.sortedLogs)return cache.sortedLogs;
  cache.player=name;
  cache.sortedLogs=st.playerStats.filter(p=>p.PLAYER_NAME===name).sort((a,b)=>(b.GAME_DATE||"").localeCompare(a.GAME_DATE||""));
  return cache.sortedLogs;
}

function computeBestBets(){
  if(!st.props.length||!st.playerStats.length){cache.bestBets=[];return}
  const logsByP={};st.playerStats.forEach(p=>{const n=p.PLAYER_NAME;if(!logsByP[n])logsByP[n]=[];logsByP[n].push(p)});
  const plays=[];
  st.props.forEach(prop=>{
    if(!prop.DK_LINE||!prop.OVER_ODDS)return;
    const ln=parseFloat(prop.DK_LINE),logs=logsByP[prop.PLAYER_NAME];
    if(!logs||logs.length<5)return;
    const sorted=logs.sort((a,b)=>(b.GAME_DATE||"").localeCompare(a.GAME_DATE||""));
    const last=sorted[0]?.GAME_DATE||"";
    if(last<new Date(Date.now()-10*864e5).toISOString().slice(0,10))return;
    const hits=logs.filter(p=>toNum(p[prop.METRIC])>ln).length;
    const sR=hits/logs.length,oI=impliedProb(prop.OVER_ODDS),e=sR-oI;
    const c=getConfidence(sR,oI,e);
    if(c&&c.stars>=4)plays.push({player:prop.PLAYER_NAME,metric:prop.METRIC,line:ln,odds:prop.OVER_ODDS,edge:e,conf:c});
  });
  plays.sort((a,b)=>b.edge-a.edge);
  cache.bestBets=plays;
}

// ═══════════════════════════════════
// 🔥 STREAK DETECTION ENGINE
// ═══════════════════════════════════
function getStreaks(){
  const streaks=[];
  const STREAK_TYPES=[
    {key:"PTS",threshold:25,label:"Scoring Streak",emoji:"🔥",desc:"games w/ 25+ PTS"},
    {key:"PTS",threshold:30,label:"Elite Scoring",emoji:"🔥🔥",desc:"games w/ 30+ PTS"},
    {key:"PRA",threshold:30,label:"PRA Streak",emoji:"💎",desc:"games w/ 30+ PRA"},
    {key:"PRA",threshold:40,label:"Stuffing Stats",emoji:"💎💎",desc:"games w/ 40+ PRA"},
    {key:"AST",threshold:8,label:"Dime Streak",emoji:"🎯",desc:"games w/ 8+ AST"},
    {key:"REB",threshold:10,label:"Board Streak",emoji:"💪",desc:"games w/ 10+ REB"},
    {key:"FG3M",threshold:3,label:"Sniper Streak",emoji:"🎯",desc:"games w/ 3+ 3PM"},
    {key:"FG3M",threshold:4,label:"Heat Check",emoji:"🎯🔥",desc:"games w/ 4+ 3PM"},
    {key:"STOCKS",threshold:3,label:"Defensive Streak",emoji:"🛡️",desc:"games w/ 3+ STL+BLK"},
    {key:"DK_FP",threshold:40,label:"Fantasy Streak",emoji:"⚡",desc:"games w/ 40+ DK FP"},
  ];

  const tonightNames=new Set(st.tonight.map(p=>p.PLAYER_NAME).filter(Boolean));
  const tonightMap=new Map();
  st.tonight.forEach(p=>{if(p.PLAYER_NAME)tonightMap.set(p.PLAYER_NAME,p)});

  for(const sT of STREAK_TYPES){
    for(const name of tonightNames){
      const logs=getPlayerLogs(name);
      if(logs.length<3)continue;
      let streak=0;
      for(const g of logs){
        if(toNum(g[sT.key])>=sT.threshold)streak++;
        else break;
      }
      if(streak<3)continue;

      const pT=tonightMap.get(name)||{};
      const recentVals=logs.slice(0,7).map(g=>toNum(g[sT.key]));
      const avgDuring=logs.slice(0,streak).reduce((s,g)=>s+toNum(g[sT.key]),0)/streak;
      const seasAvg=toNum(logs[0][`Seas_${sT.key}`]);

      const prop=st.props.find(pr=>(pr.PLAYER_NAME||"")=== name&&pr.METRIC===sT.key);

      streaks.push({
        player:name,team:pT.TEAM_ABBREVIATION||"",opp:pT.TONIGHT_OPP||"",
        stat:sT.key,threshold:sT.threshold,streak,
        label:sT.label,emoji:sT.emoji,desc:sT.desc,
        avgDuring:avgDuring.toFixed(1),seasAvg:seasAvg.toFixed(1),
        recentVals,
        dkLine:prop?prop.DK_LINE:null,
        overOdds:prop?parseInt(prop.OVER_ODDS)||null:null,
      });
    }
  }

  // Deduplicate: keep longest per player+stat+threshold
  const best={};
  for(const s of streaks){const k=`${s.player}|${s.stat}|${s.threshold}`;if(!best[k]||s.streak>best[k].streak)best[k]=s}
  const result=Object.values(best);
  result.sort((a,b)=>b.streak-a.streak);
  return result;
}

function getStreakHeat(s){
  if(s>=10)return{label:"INFERNO",color:"#ef4444",cls:"inferno"};
  if(s>=6)return{label:"ON FIRE",color:"#ff6b35",cls:"fire"};
  if(s>=4)return{label:"HOT",color:"#eab308",cls:"hot"};
  return{label:"WARM",color:"#ffd966",cls:"warm"};
}

function streakMiniChart(vals,threshold){
  const max=Math.max(...vals,threshold+1);
  const bars=vals.slice().reverse();
  return bars.map(v=>{
    const h=Math.max(3,(v/max)*26);
    return`<div class="streak-chart-bar" style="height:${h}px;background:${v>=threshold?'#22c55e':'#ef4444'};opacity:.85"></div>`;
  }).join("");
}

function getAIConfClass(c){c=(c||"").toUpperCase();if(c==="SMASH")return"smash";if(c==="OVER")return"over";return"fade"}
function getAIConfColor(c){c=(c||"").toUpperCase();if(c==="SMASH")return"#22c55e";if(c==="OVER")return"#eab308";return"#ef4444"}

function switchTab(t){st.activeTab=t;render()}
function setPicksView(v){st.picksView=v;render()}
function setPropsMetric(m){st.propsMetric=m;render()}
function setStreakFilter(f){st.streakFilter=f;render()}
function toggleDrafted(name){if(st.drafted.has(name))st.drafted.delete(name);else st.drafted.add(name);render()}
function resetDrafted(){st.drafted.clear();render()}

function getDraftBoard(){
  const board=[];
  const aiMap=new Map();
  st.aiPicks.forEach(p=>{if(p.player)aiMap.set(p.player,p)});

  for(const p of st.tonight){
    const name=p.PLAYER_NAME;if(!name)continue;
    const logs=getPlayerLogs(name);
    const most=logs[0]||{};

    // Calculate UD_FP from rolling averages or season stats
    const seasPTS=toNum(most.Seas_PTS),seasREB=toNum(most.Seas_REB),seasAST=toNum(most.Seas_AST);
    const seasSTL=toNum(most.Seas_STL),seasBLK=toNum(most.Seas_BLK),seasTOV=toNum(most.Seas_TOV);
    const projUD=seasPTS*1.0+seasREB*1.2+seasAST*1.5+seasSTL*3.0+seasBLK*3.0+seasTOV*-1.0;

    const l5PTS=toNum(most.L5_PTS),l5REB=toNum(most.L5_REB),l5AST=toNum(most.L5_AST);
    const l5STL=toNum(most.L5_STL),l5BLK=toNum(most.L5_BLK),l5TOV=toNum(most.L5_TOV);
    const l5UD=l5PTS*1.0+l5REB*1.2+l5AST*1.5+l5STL*3.0+l5BLK*3.0+l5TOV*-1.0;

    const stocks=seasSTL+seasBLK;
    const stocksFP=stocks*3.0;
    const astFP=seasAST*1.5;
    const scoringFP=seasPTS*1.0;
    const stocksBoost=stocksFP/(projUD||1);
    const astBoost=astFP/(projUD||1);

    const aiPick=aiMap.get(name);
    const isSmash=aiPick&&(aiPick.confidence||"").toUpperCase()==="SMASH";
    const gameTotal=toNum(p.GAME_TOTAL);
    const spread=p.SPREAD;

    board.push({
      name,team:p.TEAM_ABBREVIATION||"",opp:p.TONIGHT_OPP||"",
      projUD:projUD.toFixed(1),l5UD:l5UD.toFixed(1),
      seasPTS,seasREB,seasAST,stocks:stocks.toFixed(1),
      stocksBoost,astBoost,
      gameTotal,spread,
      isSmash,aiPick,
      gamesPlayed:logs.length
    });
  }

  board.sort((a,b)=>parseFloat(b.projUD)-parseFloat(a.projUD));
  return board;
}

function streakToDash(name){window.scrollTo(0,0);st.player=name;st.activeTab="dashboard";st.oppFilter="";const p=st.props.find(pr=>pr.PLAYER_NAME===name&&pr.METRIC===st.metric);st.line=p?.DK_LINE||"";cache.player=null;render()}

  const lineNum=parseFloat(line)||0;
  const pT=tonight.find(t=>t.PLAYER_NAME===player)||{};
  const allLogs=getPlayerLogs(player);
  const last10=allLogs.slice().reverse().slice(-10);
  const most=allLogs[0]||{};
  const prop=props.find(p=>p.PLAYER_NAME===player&&p.METRIC===metric)||{};
  const split=splits.find(s=>s.PLAYER_NAME===player)||{};

  const seasAvg=toNum(most[`Seas_${metric}`]),l10Avg=toNum(most[`L10_${metric}`]),l5Avg=toNum(most[`L5_${metric}`]),lastGame=toNum(most[metric]);

  const overOdds=prop.OVER_ODDS,underOdds=prop.UNDER_ODDS;

  const edge=sRate!==null&&overImpl!==null?sRate-overImpl:null;

  const maxLog=Math.max(...last10.map(g=>toNum(g[metric])),lineNum||0,1);

    <div class="section"><div class="card"><div class="card-title">⚡ Vegas</div>
      <div class="vegas-row"><span class="vegas-key">${esc(pT.TEAM_ABBREVIATION||"—")} vs ${esc(pT.TONIGHT_OPP||"—")}</span><span style="color:#22c55e;font-size:12px;font-weight:600">${pT.SPREAD?`Spread: ${pT.SPREAD}`:"—"}</span></div>
      <div class="vegas-row"><span class="vegas-key">Team Total</span><span class="vegas-val">${pT.IMPLIED_TOTAL||"—"}</span></div>
      <div class="vegas-row"><span class="vegas-key">Opp Total</span><span class="vegas-val">${pT.OPP_IMPLIED_TOTAL||"—"}</span></div>
      <div class="vegas-row"><span class="vegas-key">Game Total</span><span class="vegas-val">${pT.GAME_TOTAL||"—"}</span></div>
    </div></div>
    <div class="section"><div class="card"><div class="card-title">🎰 DK Props — ${metric}</div>
      ${prop.DK_LINE?`<div class="dk-line">Line: ${prop.DK_LINE}</div><div class="dk-odds"><span style="color:#22c55e;font-size:12px">${overOdds?`Over: ${fmtOdds(overOdds)} (${(overImpl*100).toFixed(1)}%)`:"—"}</span><span style="color:#ef4444;font-size:12px">${underOdds?`Under: ${fmtOdds(underOdds)} (${(underImpl*100).toFixed(1)}%)`:"—"}</span></div>`:`<div class="no-data" style="margin-bottom:8px">No DK line available</div>`}
      ${lineNum?`<div class="hit-row" style="border-top:1px solid #333;padding-top:8px;margin-top:4px"><span class="hit-key">L5</span><span class="hit-val">${hL5} / 5</span></div><div class="hit-row"><span class="hit-key">L10</span><span class="hit-val">${hL10} / 10</span></div><div class="hit-row"><span class="hit-key">Season</span><span class="hit-val">${hS} / ${allLogs.length} (${sRate!==null?(sRate*100).toFixed(0):"—"}%)${pushS>0?` · ${pushS} push`:""}</span></div>`:""}
    </div></div>
    ${conf?`<div class="section"><div class="confidence" style="background:${conf.color}22;border:2px solid ${conf.color}"><div class="conf-label" style="color:${conf.color}">${conf.label}</div>${edge!==null?`<div class="conf-edge">Edge: ${edge>0?"+":""}${(edge*100).toFixed(1)}% vs book</div>`:""}</div></div>`:""}
    <div class="timestamp">Data: ${esc(lastUp)}${st.loadedAt?` · Loaded: ${st.loadedAt}`:""}</div>
    <div class="timestamp" style="color:#555;font-size:9px;padding-top:0">Made by S. Krolikowski w/ Claude · 2026</div>
  </div>

  <div class="page ${activeTab==="gamelog"?"active":""}">${logHTML}</div>
  <div class="page ${activeTab==="picks"?"active":""}">${picksHTML}</div>

  <div class="tab-bar">
    <button class="tab-btn ${activeTab==="dashboard"?"active":""}" onclick="switchTab('dashboard')">📊 Dash</button>
    <button class="tab-btn ${activeTab==="gamelog"?"active":""}" onclick="switchTab('gamelog')">📋 Log</button>
    <button class="tab-btn ${activeTab==="picks"?"active":""}" onclick="switchTab('picks')">🔥 Picks</button>
  </div>`;

  // Event listeners
  document.getElementById("playerSelect")?.addEventListener("change",e=>{st.player=e.target.value;st.oppFilter="";const p=st.props.find(pr=>pr.PLAYER_NAME===st.player&&pr.METRIC===st.metric);st.line=p?.DK_LINE||"";cache.player=null;render()});
  document.getElementById("metricSelect")?.addEventListener("change",e=>{st.metric=e.target.value;const p=st.props.find(pr=>pr.PLAYER_NAME===st.player&&pr.METRIC===st.metric);st.line=p?.DK_LINE||"";render()});
  document.getElementById("lineInput")?.addEventListener("input",e=>{st.line=e.target.value;render()});
  document.getElementById("refreshBtn")?.addEventListener("click",loadAllData);
  document.getElementById("oppFilter")?.addEventListener("change",e=>{st.oppFilter=e.target.value;render()});
  document.getElementById("propsSearchInput")?.addEventListener("input",e=>{st.propsSearch=e.target.value;render()});
  // AI pick click -> dashboard
  document.querySelectorAll(".ai-pick-card[data-ai-idx]").forEach(c=>{c.addEventListener("click",()=>{const pk=aiPicks[parseInt(c.dataset.aiIdx)];if(pk){st.player=pk.player;st.metric=pk.prop_type||"PTS";st.line=String(pk.line||"");cache.player=null;switchTab("dashboard")}})});
  // Stats edge click -> dashboard
  document.querySelectorAll(".bet-card[data-bet-idx]").forEach(c=>{c.addEventListener("click",()=>{const p=cache.bestBets?.[parseInt(c.dataset.betIdx)];if(p){st.player=p.player;st.metric=p.metric;st.line=String(p.line);cache.player=null;switchTab("dashboard")}})});
}

function loadAllData(){
  st.loading=true;st.error=null;cache.bestBets=null;cache.player=null;cache.sortedLogs=null;render();
  Promise.all([
    fetchSheet("Tonights_Opponent").catch(()=>null),
    fetchSheet("Player_Stats").catch(()=>null),
    fetchSheet("DK_Player_Props").catch(()=>[]),
    fetchSheet("Home_Away_Splits").catch(()=>[]),
    fetchSheet("Daily_Picks").catch(()=>[])
  ]).then(([tonight,stats,props,splits,picks])=>{
    if(!tonight||!stats){st.error="Could not load critical sheets.";st.loading=false;render();return}
    st.tonight=tonight;st.playerStats=stats;st.props=props||[];st.splits=splits||[];
    st.aiPicks=(picks||[]).sort((a,b)=>toNum(a.rank)-toNum(b.rank));
    st.loading=false;st.loadedAt=new Date().toLocaleTimeString();
    if(tonight.length>0&&!st.player){st.player=tonight[0].PLAYER_NAME||"";const p=st.props.find(pr=>pr.PLAYER_NAME===st.player&&pr.METRIC===st.metric);st.line=p?.DK_LINE||""}
    computeBestBets();st.streaks=getStreaks();render();
  }).catch(()=>{st.loading=false;st.error="Could not load data. Make sure your Google Sheet is set to 'Anyone with the link can view'.";render()});
}
loadAllData();
</script>
</body>
</html>
